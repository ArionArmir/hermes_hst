leverage: 3
stop_loss_pct: 0.05
take_profit_pct: 0.04
max_position_size_usdt: 50.0
trailing_stop_pct: 0.015
# Frazione max del capitale impegnabile come margine (tutte le posizioni)
max_exposure: 0.5
# Max posizioni simultanee nella STESSA direzione: con crypto correlate,
# max_exposure da solo non basta (rischio di ribasso sincrono che chiude
# in blocco più simboli long/short insieme). Tarato con walk_forward.py.
max_positions_same_direction: 3
# Fee taker simulate per lato (0.05% Binance Futures)
taker_fee_pct: 0.0005
min_volatility_threshold: 0.001
max_volatility_threshold: 0.02
volatility_adjustment: true
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - TRXUSDT
  - DOGEUSDT
  - BNBUSDT
  - XRPUSDT
timeframe: 1h
# UNICO regolatore di selettività dei segnali (usato da inference/policy,
# engine e backtest). Tarato 2026-07-16 con tune_strategy.py su due finestre
# out-of-sample; sopra 0.60 i segnali quasi spariscono.
ml_confidence_threshold: 0.55
sentiment_weight: 0.3
# Allineato all'orizzonte del target del modello: 5 candele × 1h.
# Se cambi timeframe o TARGET_HORIZON_BARS, aggiorna anche questo.
max_holding_minutes: 300
# Anti flip-flop: età minima posizione per il reverse, confidenza extra
# per invertire, attesa dopo una chiusura prima di rientrare sul simbolo
reverse_cooldown_minutes: 15
reverse_confidence_margin: 0.05
entry_cooldown_minutes: 60
