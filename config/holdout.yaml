  0.50) con il conteggio onesto dei tentativi è 21.4%: sotto il livello che la fortuna
  produce da sola. Questi simboli non sono mai stati scaricati, quindi mai analizzati.'
regola: 'APRIRE UNA VOLTA SOLA, su un candidato unico già congelato, tramite src.shared.holdout.open_seal(),
  dichiarando i tentativi consumati. Ogni ricerca condotta qui trasforma l''holdout
  in un set di ricerca e ne annulla il valore: riscegliendo il meglio di 6 su un holdout,
  un edge vero di 0 si rilegge +156 (simulazione 100k, 2026-07-16).'
criterio_pulizia: Mai presenti in data/historical/, che è il registro di tutto ciò
  che è stato scaricato. Un simbolo mai scaricato non può essere stato analizzato.
  Verificato automaticamente da questo script.
